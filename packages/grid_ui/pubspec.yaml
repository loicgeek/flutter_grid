name: grid_ui
description: >-
  Pre-built UI layer for ntech_grid. Ships FlutterGrid, GridDataTable,
  GridTheme, GridSlots, built-in cell renderers (badge, avatar, progress, link,
  money, date, boolean…), toolbar, search, and pagination widgets.
version: 0.1.4
repository: https://github.com/loicgeek/flutter_grid/tree/main/packages/grid_ui
issue_tracker: https://github.com/loicgeek/flutter_grid/issues
homepage: https://github.com/loicgeek/flutter_grid

topics:
  - table
  - grid
  - data-table
  - flutter-grid
  - ui

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  grid_core:
    path: ../grid_core
  grid_flutter:
    path: ../grid_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0
